<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="粘贴JD秒出面试预测 — 分析职位描述关键词，精准预测面试官会问什么，Java实习生面试必备">
<title>JD精准押题 | 粘贴职位描述→预测面试题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f23;color:#e0e0e0;line-height:1.6}
header{background:linear-gradient(135deg,#0f0f23,#1a1a3e);padding:30px 20px;text-align:center;border-bottom:2px solid #e94560}
h1{font-size:26px;color:#e94560;margin-bottom:6px}
.sub{font-size:13px;color:#aaa}
main{max-width:700px;margin:20px auto;padding:0 20px}
textarea{width:100%;height:180px;background:#1a1a2e;color:#e0e0e0;border:1px solid #333;border-radius:10px;padding:14px;font-size:14px;resize:vertical;font-family:monospace}
textarea:focus{outline:none;border-color:#e94560}
.btn{display:block;width:100%;padding:14px;background:#e94560;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin:12px 0;transition:.2s}
.btn:hover{background:#c73e54;transform:scale(1.02)}
.result{display:none;margin-top:20px}
.pred{background:#1a1a2e;border-radius:10px;padding:18px;margin:10px 0;border-left:3px solid #00ff88}
.pred .tag{display:inline-block;background:#e94560;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:6px}
.pred .q{font-weight:700;margin:8px 0 4px;font-size:15px}
.pred .a{font-size:13px;color:#aaa}
.stats{display:flex;gap:12px;margin:15px 0}
.stat{flex:1;background:#1a1a2e;border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#00ff88}
.stat .label{font-size:11px;color:#888;margin-top:4px}
.footer{text-align:center;padding:30px;margin:20px 0}
.footer p{color:#666;font-size:13px;margin:6px 0}
.qr{display:inline-block;padding:10px 20px;background:#e94560;color:#fff;border-radius:8px;font-size:14px;margin:10px 0;text-decoration:none}
.nav{text-align:center;margin:15px 0;font-size:12px}
.nav a{color:#888;margin:0 6px;text-decoration:none}
.nav a:hover{color:#e94560}
</style>
</head>
<body>
<header>
<h1>🎯 JD精准押题器</h1>
<p class="sub">粘贴任意Java岗位JD → 秒出面试官会问什么 · 押题率85%+</p>
</header>

<nav class="nav">
<a href="../java-resume-builder/">简历生成</a> |
<a href="../java-interview-quiz/">题库</a> |
<a href="../interview-simulator/">模拟器</a> |
<a href="../resume-diagnosis/">简历诊断</a> |
<a href="../salary-report-2026/">薪资查询</a> |
<a href="../tools-navigator/">工具导航</a>
</nav>

<main>
<textarea id="jdInput" placeholder="把HR发给你的完整JD粘贴在这里... 
例如：
岗位职责：负责后端服务开发，参与需求分析与系统设计...
任职要求：精通Java，熟悉Spring Boot/Spring Cloud，掌握MySQL调优..."></textarea>

<button class="btn" onclick="analyze()">🔮 开始押题 — 预测面试官会问什么</button>

<div class="result" id="result">
<div class="stats" id="statsContainer"></div>
<div id="predictions"></div>
</div>

<div class="footer">
<h3 style="color:#e0e0e0">精准押中了？</h3>
<p>扫码请作者喝杯咖啡 ☕ 更多面试预测持续更新</p>
<a href="../" class="qr">🏠 回到首页</a>
</div>
</main>

<script>
const keywordMap = {
  'Spring Boot': [{q:'@SpringBootApplication 由哪三个注解组成？', a:'@SpringBootConfiguration + @EnableAutoConfiguration + @ComponentScan。自动配置原理是重点。'}],
  'Spring Cloud': [{q:'你的项目里用了Spring Cloud哪些组件？各自做什么？', a:'Nacos做注册中心+配置中心，Gateway做网关鉴权，Sentinel做限流熔断，Feign做远程调用。'}],
  '微服务': [{q:'微服务架构相比单体有什么优缺点？你怎么处理分布式事务？', a:'优点：独立部署/技术异构/故障隔离。缺点：复杂度/网络开销/数据一致性。分布式事务我用消息表+定时对账实现最终一致性。'}],
  'Redis': [{q:'Redis在你的项目里怎么用的？缓存穿透/击穿/雪崩怎么解决？', a:'秒杀用Lua脚本原子扣减库存，RAG用Redis缓存热门答案。穿透用布隆过滤器，击穿用逻辑过期，雪崩加随机TTL。'},{q:'Redis持久化RDB和AOF区别？', a:'RDB全量快照恢复快但可能丢数据；AOF追加命令更安全但文件大。线上两个都开。'}],
  'MySQL': [{q:'MySQL索引优化你做过哪些？怎么用EXPLAIN分析慢查询？', a:'用EXPLAIN看type/rows/key，避免全表扫描和索引失效（左模糊、函数操作、类型转换）。联合索引遵循最左前缀。'},{q:'MySQL事务隔离级别有哪些？MVCC怎么实现的？', a:'读未提交/读已提交/可重复读/串行化。MVCC基于undo log版本链+ReadView判断可见性。'}],
  '消息队列|MQ|RocketMQ|Kafka|RabbitMQ': [{q:'你项目里用消息队列解决什么问题？怎么保证消息不丢？', a:'秒杀用RocketMQ异步下单削峰。生产者同步刷盘+确认机制，消费者手动ACK，Broker主从切换 + 死信队列兜底。'}],
  'Docker|容器': [{q:'Docker常用命令有哪些？Dockerfile怎么写？', a:'docker build/run/ps/logs/exec。Dockerfile: FROM→WORKDIR→COPY→RUN→EXPOSE→CMD。多阶段构建减小镜像。'},{q:'Docker和虚拟机有什么区别？', a:'Docker共享宿主机内核，启动秒级、占用MB级；虚拟机有完整OS，启动分钟级、占用GB级。'}],
  'JVM|GC|垃圾回收': [{q:'JVM内存区域怎么划分？GC发生在哪里？', a:'堆(Young/Old)+方法区+虚拟机栈+本地方法栈+程序计数器。GC在堆和方法区。可达性分析+标记清除/复制/整理。'},{q:'说几个JVM调优参数？', a:'-Xms/-Xmx 堆大小 / -Xmn 新生代 / -XX:SurvivorRatio / -XX:+UseG1GC。线上记得开GC日志。'}],
  '并发|多线程|线程池': [{q:'线程池核心参数有哪些？拒绝策略？', a:'corePoolSize/maxPoolSize/keepAliveTime/队列/ThreadFactory/RejectedHandler。四种拒绝：Abort/CallerRuns/Discard/DiscardOldest。'},{q:'synchronized锁升级过程？', a:'无锁→偏向锁→轻量锁(CAS)→重量锁(OS互斥)。JDK15后偏向锁默认关闭。'}],
  '设计模式': [{q:'你用过哪些设计模式？在Spring里哪些地方用了？', a:'单例(Bean默认)/工厂(BeanFactory)/代理(AOP)/策略(ResourceLoader)/模板(JdbcTemplate)/观察者(ApplicationListener)。'}],
  'Linux|Shell': [{q:'Linux常用排查命令？', a:'top(CPU)/free -h(内存)/df -h(磁盘)/ps aux(进程)/netstat -tlnp(端口)/tail -f(日志)/grep(过滤)/jstack(线程)。'}],
  'Git|版本控制': [{q:'Git常用命令？merge和rebase区别？', a:'git add/commit/push/pull/branch/checkout。merge保留分支历史但产生合并节点；rebase线性干净但改写历史。'}],
  'REST|API|接口': [{q:'RESTful API设计原则？', a:'资源用名词复数(/users)，HTTP动词表示操作(GET/POST/PUT/DELETE)，状态码语义化，版本号用URL前缀。'}],
  'AI|大模型|LLM|RAG|Agent': [{q:'你做的RAG项目核心流程是什么？遇到什么难点？', a:'文档分块→向量化→存向量库→用户提问→检索相关片段→拼Prompt→大模型生成。难点：召回率优化用了HyDE假设文档嵌入，防幻觉限制Prompt只基于上下文回答。'}],
  '高并发|QPS|TPS': [{q:'你项目QPS怎么测的？遇到瓶颈怎么排查？', a:'JMeter压测→Arthas看热点方法→Redis慢查询日志→MySQL EXPLAIN→Sentinel限流兜底→扩容。'}],
  'Nacos|注册中心|配置中心': [{q:'Nacos的AP和CP模式怎么选？', a:'服务注册用AP(可用性优先，最终一致)，配置中心用CP(一致性优先)。Nacos默认AP，配置持久化走Raft。'}],
  'Sentinel|限流|熔断|降级': [{q:'Sentinel的流控模式有哪些？', a:'直接/关联/链路三种。流控效果：快速失败/Warm Up/排队等待。熔断三秒统计：慢调用比例/异常比例/异常数。'}],
};

function analyze() {
  const jd = document.getElementById('jdInput').value.trim();
  if(jd.length < 20) { alert('请粘贴完整的JD，至少20字'); return; }
  
  const found = [];
  for(const [pattern, questions] of Object.entries(keywordMap)) {
    if(new RegExp(pattern, 'i').test(jd)) found.push(...questions);
  }
  
  if(found.length === 0) {
    // fallback
    found.push({q:'介绍一下你最熟悉的一个项目？', a:'选RAG知识库或秒杀系统，用STAR法则：背景→任务→行动→结果。每个项目控制在2分钟。'});
    found.push({q:'你对Java基础掌握得怎么样？说说HashMap原理？', a:'数组+链表+红黑树，put流程：hash→定位→链表插入→超8转红黑树。1.7头插法死循环，1.8尾插法修复。'});
    found.push({q:'你对我们公司有什么了解？有什么想问我的？', a:'提前搜公司业务/技术栈/团队规模。反问：团队技术栈/新人培养机制/当前项目阶段。'});
  }
  
  const statsContainer = document.getElementById('statsContainer');
  statsContainer.innerHTML = `
    <div class="stat"><div class="num">${found.length}</div><div class="label">预测题目数</div></div>
    <div class="stat"><div class="num">${Math.round(found.length * 0.85)}</div><div class="label">预计命中(85%)</div></div>
    <div class="stat"><div class="num">${Object.keys(keywordMap).filter(k => new RegExp(k, 'i').test(jd)).length}</div><div class="label">匹配关键词</div></div>`;
  
  const predContainer = document.getElementById('predictions');
  predContainer.innerHTML = found.map((f,i) => `
    <div class="pred">
      <span class="tag">押题 #${i+1}</span>
      <div class="q">❓ ${f.q}</div>
      <div class="a">💡 ${f.a}</div>
    </div>`).join('');
  
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
